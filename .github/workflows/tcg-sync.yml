name: TCG Sync (Hourly)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install instaloader

      - name: Run TCG sync
        run: npm run tcg:sync
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TCG_POSTS_PER_HANDLE: ${{ secrets.TCG_POSTS_PER_HANDLE }}
          TCG_PYTHON_BIN: python3
          INSTALOADER_USERNAME: ${{ secrets.INSTALOADER_USERNAME }}
          INSTALOADER_PASSWORD: ${{ secrets.INSTALOADER_PASSWORD }}
          INSTALOADER_SESSIONFILE: ${{ secrets.INSTALOADER_SESSIONFILE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
